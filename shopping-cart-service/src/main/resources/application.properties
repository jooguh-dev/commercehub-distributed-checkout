spring.application.name=shopping-cart-service
server.port=8080
services.credit-card-authorizer.base-url=http://localhost:8082
cart.storage.mode=in-memory
cart.storage.dynamodb.table=commercehub-a3-cart-state
cart.storage.dynamodb.consistent-read=true
cart.checkout.in-progress-timeout-ms=30000
rabbitmq.host=localhost
rabbitmq.port=5672
rabbitmq.username=guest
rabbitmq.password=guest
rabbitmq.virtual-host=/
rabbitmq.queue=warehouse-orders
rabbitmq.dead-letter-exchange=warehouse-orders.dlx
rabbitmq.dead-letter-queue=warehouse-orders.dlq
rabbitmq.dead-letter-routing-key=warehouse-orders
rabbitmq.publish-timeout-ms=5000
rabbitmq.retry.max-attempts=3
rabbitmq.retry.backoff-ms=100
rabbitmq.bulkhead.max-concurrent-publishes=128
rabbitmq.bulkhead.acquire-timeout-ms=250
rabbitmq.circuit-breaker.failure-threshold=5
rabbitmq.circuit-breaker.open-ms=5000
http.client.pool.max-total-connections=200
http.client.pool.max-connections-per-route=100
http.client.connect-timeout-ms=3000
http.client.read-timeout-ms=5000
http.client.connection-request-timeout-ms=2000
